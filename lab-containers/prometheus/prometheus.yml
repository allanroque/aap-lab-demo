# ============================
# CONFIGURAÇÃO GLOBAL
# ============================

global:
  scrape_interval: 15s

# ============================
# CONFIGURAÇÃO DO ALERTMANAGER
# ============================

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - "alert_filesystem_usage.yml"
  - "alert_memory_usage.yml"
  - "alert_selinux_disabled.yml"

# ============================
# JOB: Prometheus
# ============================

scrape_configs:

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

# ============================
# JOB: Blackbox HTTP
# ============================

  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://example.com
          - http://localhost:3000
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

# ============================
# JOB: Blackbox HTTPS
# ============================

  - job_name: 'blackbox-https'
    metrics_path: /probe
    params:
      module: [https_2xx]
    static_configs:
      - targets:
          - https://example.com
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

# ============================
# JOB: Blackbox ICMP
# ============================

  - job_name: 'blackbox-icmp'
    metrics_path: /probe
    params:
      module: [icmp]
    static_configs:
      - targets:
          - 8.8.8.8
          - 1.1.1.1
          - 192.168.100.26  # server01.aroque.com.br
          - 192.168.100.27  # server02.aroque.com.br
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

# ============================
# JOB: Blackbox SSH
# ============================

  - job_name: 'blackbox-ssh'
    metrics_path: /probe
    params:
      module: [ssh_banner]
    static_configs:
      - targets:
          - your.ssh.host:22
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

# ============================
# JOB: Linux Nodes via Node Exporter
# ============================

  - job_name: 'linux-nodes'
    static_configs:
      - targets:
          - server01.aroque.com.br:9100
          - server02.aroque.com.br:9100
          - 192.168.100.11:9100

  - job_name: 'aap-controller'
    metrics_path: /api/controller/v2/metrics/
    scheme: https
    basic_auth:
      username: "admin"
      password: "redhat*99"
    tls_config:
      insecure_skip_verify: true
    static_configs:
      - targets: ['192.168.100.11']
