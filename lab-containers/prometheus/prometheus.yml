# ============================
# CONFIGURAÇÃO GLOBAL
# ============================

global:
  scrape_interval: 15s   # Intervalo padrão entre coletas

# ============================
# CONFIGURAÇÃO DO ALERTMANAGER
# ============================

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']  # Nome do serviço no podman-compose

# ============================
# JOB: Prometheus
# ============================

scrape_configs:

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']  # O próprio Prometheus (self-monitoring)

# ============================
# JOB: Blackbox HTTP
# ============================

  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://example.com
          - http://localhost:3000  # Grafana
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

# ============================
# JOB: Blackbox HTTPS
# ============================

  - job_name: 'blackbox-https'
    metrics_path: /probe
    params:
      module: [https_2xx]
    static_configs:
      - targets:
          - https://example.com
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

# ============================
# JOB: Blackbox ICMP (ping)
# ============================

  - job_name: 'blackbox-icmp'
    metrics_path: /probe
    params:
      module: [icmp]
    static_configs:
      - targets:
          - 8.8.8.8
          - 1.1.1.1
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

# ============================
# JOB: Blackbox SSH
# ============================

  - job_name: 'blackbox-ssh'
    metrics_path: /probe
    params:
      module: [ssh_banner]
    static_configs:
      - targets:
          - your.ssh.host:22
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115
