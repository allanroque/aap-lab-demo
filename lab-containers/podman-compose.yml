version: "3.9"

services:

  gitea:
    image: gitea/gitea:latest
    container_name: gitea
    ports:
      - "3001:3000"   # Web UI
      - "3022:22"     # SSH clone (não obrigatório)
    environment:
      - USER_UID=1000
      - USER_GID=1000
    volumes:
      - ../../volumes/gitea:/data:Z

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-local-config.yml:/etc/loki/local-config.yml:Z
      - ../../volumes/loki:/loki:Z
    command:
      - "--config.file=/etc/loki/local-config.yml"

  blackbox:
    image: docker.io/prom/blackbox-exporter:latest
    container_name: blackbox
    ports:
      - "9115:9115"
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:Z
    command:
      - "--config.file=/etc/blackbox_exporter/config.yml"

  alertmanager:
    image: docker.io/prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/config.yml:/etc/alertmanager/config.yml:Z
      - ../../volumes/alertmanager:/alertmanager:Z
    command:
      - "--config.file=/etc/alertmanager/config.yml"
      - "--storage.path=/alertmanager"

  prometheus:
    image: docker.io/prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:Z
      - ../../volumes/prometheus:/prometheus:Z
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  grafana:
    image: docker.io/grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin  #default login: admin / admin — password change is required on first login
    volumes:
      - ../../volumes/grafana:/var/lib/grafana:Z

# ============================
# CONFIGURAÇÃO DO NETBOX = POSTGRES + REDIS + NETBOX
# ============================

  netbox-postgres:
    image: postgres:15
    container_name: netbox-postgres
    environment:
      - POSTGRES_DB=netbox
      - POSTGRES_USER=netbox
      - POSTGRES_PASSWORD=netbox
    volumes:
      - ../../volumes/postgres:/var/lib/postgresql/data:Z

  netbox-redis:
    image: redis:7
    container_name: netbox-redis
    volumes:
      - ../../volumes/redis:/data:Z

  netbox:
    image: lscr.io/linuxserver/netbox:latest
    container_name: netbox
    depends_on:
      - netbox-postgres
      - netbox-redis
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
      - DB_HOST=netbox-postgres
      - DB_NAME=netbox
      - DB_USER=netbox
      - DB_PASSWORD=netbox
      - REDIS_HOST=netbox-redis
      - REDIS_PORT=6379
      - ALLOWED_HOSTS=*
    volumes:
      - ../../volumes/netbox:/config:Z
    ports:
      - "8000:8000"